<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirect to index.html</title>
    <script type="text/javascript">
      // This script handles redirection for Single Page Applications on GitHub Pages.
      // It takes the current URL and redirects back to index.html with the path as a query parameter.
      var pathSegmentsToKeep = 0;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/index.html' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
